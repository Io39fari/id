<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalam ID — Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="shortcut icon" href="https://dalam.world/uploads/monthly_2026_02/favicon-dw.ico.57224f73f7d958bcfcedbcb16bdd7c65.ico">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========== RESET & ПЕРЕМЕННЫЕ ========== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --dark:        #0d1117;
            --dark-card:   #1c2128;
            --dark-border: #30363d;
            --gold:        #c9943a;
            --gold-light:  #e8b84b;
            --text:        #e6edf3;
            --text-muted:  #8b949e;
            --success:     #3fb950;
            --error:       #f85149;
        }

        /* ========== ФОН ========== */
        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: var(--dark);
            overflow-x: hidden;
        }

        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: url('https://ru.dalam.world/dwback.jpeg') center/cover no-repeat;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: linear-gradient(
                135deg,
                rgba(13, 17, 23, 0.92) 0%,
                rgba(13, 17, 23, 0.82) 50%,
                rgba(13, 17, 23, 0.90) 100%
            );
        }

        /* ========== LAYOUT ========== */
        .page-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            gap: 48px;
        }

        /* ========== МАСКОТ ========== */
        .mascot {
            animation: slideInRight 0.7s ease 0.2s both;
            flex-shrink: 0;
            user-select: none;
        }

        .mascot img {
            height: 480px;
            max-height: 65vh;
            width: auto;
            filter: drop-shadow(0 0 40px rgba(201, 148, 58, 0.2));
            transition: transform 0.4s ease;
        }

        .mascot img:hover {
            transform: scale(1.03) rotate(1deg);
        }

        /* ========== КАРТОЧКА ========== */
        .card {
            background: rgba(28, 33, 40, 0.82);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(201, 148, 58, 0.35);
            border-radius: 16px;
            padding: 36px 32px 28px;
            width: 420px;
            max-width: 100%;
            animation: fadeInUp 0.5s ease;
            position: relative;
            box-shadow:
                0 0 60px rgba(201, 148, 58, 0.06),
                0 24px 64px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s ease;
        }

        .card:hover {
            border-color: rgba(201, 148, 58, 0.55);
        }

        /* ========== ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКОВ ========== */
        .lang-switcher {
            position: absolute;
            top: 14px;
            right: 14px;
            display: flex;
            gap: 3px;
            align-items: center;
            flex-wrap: wrap;
            max-width: 290px;
            justify-content: flex-end;
        }

        .lang-btn {
            padding: 3px 7px;
            background: transparent;
            border: 1px solid var(--dark-border);
            border-radius: 4px;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            line-height: 1.4;
        }

        .lang-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .lang-btn.active {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--dark);
        }

        .lang-more {
            position: relative;
        }

        .lang-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            padding: 4px;
            min-width: 160px;
            z-index: 200;
            max-height: 240px;
            overflow-y: auto;
            box-shadow: 0 12px 36px rgba(0,0,0,0.5);
        }

        .lang-dropdown.open { display: block; }

        .lang-dropdown::-webkit-scrollbar { width: 4px; }
        .lang-dropdown::-webkit-scrollbar-track { background: transparent; }
        .lang-dropdown::-webkit-scrollbar-thumb { background: var(--dark-border); border-radius: 2px; }

        .lang-dropdown button {
            display: block;
            width: 100%;
            padding: 7px 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            text-align: left;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s;
        }

        .lang-dropdown button:hover {
            background: rgba(201, 148, 58, 0.1);
            color: var(--gold);
        }

        /* ========== ШАПКА КАРТОЧКИ ========== */
        .card-header {
            text-align: center;
            margin-bottom: 28px;
            padding-top: 8px;
        }

        .brand-icon {
            font-size: 28px;
            margin-bottom: 4px;
            display: block;
        }

        .brand-name {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 28px;
            color: var(--gold);
            letter-spacing: 3px;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        /* ========== ФОРМА ========== */
        .form-horizontal { margin: 0; }

        .form-group {
            margin-bottom: 16px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: var(--dark);
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 148, 58, 0.15);
        }

        .form-control::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        .form-control.input-error {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(248, 81, 73, 0.12);
        }

        .error {
            color: var(--error);
            font-size: 12px;
            margin-top: 4px;
            min-height: 0;
            line-height: 1.4;
        }

        /* ========== УПРАВЛЕНИЕ ПАРОЛЕМ ========== */
        .pass-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .pass-controls a {
            color: var(--gold);
            text-decoration: none;
            transition: color 0.2s;
        }

        .pass-controls a:hover {
            color: var(--gold-light);
            text-decoration: underline;
        }

        .pass-controls label {
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            user-select: none;
        }

        /* ========== ЧЕКБОКСЫ ========== */
        .checkbox-group {
            margin-bottom: 20px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }

        input[type="checkbox"] {
            accent-color: var(--gold);
            width: 16px;
            height: 16px;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* ========== СООБЩЕНИЯ ========== */
        #messages {
            min-height: 8px;
            margin-bottom: 8px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
            animation: fadeInUp 0.3s ease;
        }

        .alert-success {
            background: rgba(63, 185, 80, 0.08);
            border: 1px solid rgba(63, 185, 80, 0.25);
            color: var(--success);
        }

        .alert-success h4 {
            margin-bottom: 4px;
            font-size: 16px;
        }

        .alert-danger {
            background: rgba(248, 81, 73, 0.08);
            border: 1px solid rgba(248, 81, 73, 0.25);
            color: var(--error);
        }

        .alert-danger ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        /* ========== КНОПКА РЕГИСТРАЦИИ ========== */
        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            border: none;
            border-radius: 8px;
            color: var(--dark);
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.8px;
            position: relative;
            overflow: hidden;
        }

        .btn-register::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .btn-register:hover::after {
            transform: translateX(100%);
        }

        .btn-register:hover {
            box-shadow: 0 0 24px rgba(201, 148, 58, 0.5), 0 4px 16px rgba(201, 148, 58, 0.25);
            transform: translateY(-2px);
        }

        .btn-register:active {
            transform: translateY(0);
            box-shadow: 0 0 12px rgba(201, 148, 58, 0.3);
        }

        .btn-register:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-register:disabled::after { display: none; }

        /* ========== НИЖНИЕ ССЫЛКИ ========== */
        .bottom-links {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        .btn-secondary {
            flex: 1;
            padding: 10px 8px;
            background: transparent;
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            text-align: center;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-secondary:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(201, 148, 58, 0.05);
        }

        /* ========== АНИМАЦИИ ========== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        @keyframes successPulse {
            0%   { border-color: rgba(201, 148, 58, 0.35); }
            40%  { border-color: rgba(63, 185, 80, 0.7); box-shadow: 0 0 40px rgba(63, 185, 80, 0.15); }
            100% { border-color: rgba(201, 148, 58, 0.35); box-shadow: 0 0 60px rgba(201, 148, 58, 0.06), 0 24px 64px rgba(0,0,0,0.5); }
        }

        .success-flash {
            animation: successPulse 0.8s ease !important;
        }

        /* ========== АДАПТИВНОСТЬ ========== */
        @media (max-width: 992px) {
            .mascot { display: none; }
            .page-wrapper { justify-content: center; }
        }

        @media (max-width: 480px) {
            .card { padding: 28px 20px 22px; border-radius: 12px; }
            .brand-name { font-size: 22px; letter-spacing: 2px; }
            .form-control { padding: 11px 14px; font-size: 13px; }
            .btn-register { padding: 12px; font-size: 14px; }
            .bottom-links { flex-direction: column; }
            .btn-secondary { font-size: 13px; padding: 11px; }
            .lang-switcher { max-width: 200px; }
        }

        /* ========== УТИЛИТЫ ========== */
        [dir="rtl"] .pass-controls { flex-direction: row-reverse; }
        [dir="rtl"] .checkbox-group label { flex-direction: row-reverse; }
    </style>
</head>
<body>

    <!-- Фон -->
    <div class="bg-layer"></div>
    <div class="bg-overlay"></div>

    <!-- Контент -->
    <div class="page-wrapper">

        <!-- Маскот (только десктоп) -->
        <div class="mascot">
            <img src="https://ru.dalam.world/thl.png" alt="Dalam World Mascot">
        </div>

        <!-- Карточка формы -->
        <div class="card" id="card">

            <!-- Переключатель языков -->
            <div class="lang-switcher" id="lang-switcher"></div>

            <!-- Шапка -->
            <div class="card-header">
                <span class="brand-icon">&#9876;&#65039;</span>
                <h1 class="brand-name">Dalam ID</h1>
                <p class="page-subtitle" id="page-subtitle"></p>
            </div>

            <!-- Форма -->
            <form class="form-horizontal" id="register-form"
                  action="https://cp.dalam.world/register"
                  method="post" novalidate="">

                <input type="hidden" name="GHTWEB_CSRF_TOKEN"
                       id="GHTWEB_CSRF_TOKEN" value="">

                <!-- Логин -->
                <div class="form-group">
                    <input class="form-control"
                           name="RegisterForm[login]"
                           id="RegisterForm_login"
                           type="text" maxlength="14" required=""
                           autocomplete="username">
                    <div class="error" id="err-login"></div>
                </div>

                <!-- Пароль -->
                <div class="form-group">
                    <input class="form-control"
                           name="RegisterForm[password]"
                           id="RegisterForm_password"
                           type="password" maxlength="16" required=""
                           autocomplete="new-password">
                    <div class="error" id="err-password"></div>
                </div>

                <!-- Повтор пароля -->
                <div class="form-group">
                    <input class="form-control"
                           name="RegisterForm[re_password]"
                           id="RegisterForm_re_password"
                           type="password" maxlength="16" required=""
                           autocomplete="new-password">
                    <div class="error" id="err-repassword"></div>
                </div>

                <!-- Управление паролем -->
                <div class="pass-controls">
                    <a href="#" id="gen-pass">Generate Password</a>
                    <label>
                        <input type="checkbox" id="show-pass">
                        <span id="show-pass-label">Show password</span>
                    </label>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <input class="form-control"
                           name="RegisterForm[email]"
                           id="RegisterForm_email"
                           type="email" required=""
                           autocomplete="email">
                    <div class="error" id="err-email"></div>
                </div>

                <!-- Реферальный код -->
                <div class="form-group" id="referer-group">
                    <input class="form-control"
                           name="RegisterForm[referer]"
                           id="RegisterForm_referer"
                           type="text" maxlength="10" value="">
                </div>

                <!-- Сохранить TXT -->
                <div class="form-group checkbox-group" id="save-txt-group">
                    <label>
                        <input type="checkbox" id="save-txt-checkbox">
                        <span id="save-txt-label">Save account to .txt file</span>
                    </label>
                </div>

                <!-- Сообщения -->
                <div id="messages"></div>

                <!-- Кнопка -->
                <button type="submit" class="btn-register" id="submit-btn">
                    Register
                </button>
            </form>

            <!-- Нижние ссылки -->
            <div class="bottom-links">
                <a href="https://cp.dalam.world/login" class="btn-secondary" id="link-cp">
                    &#127918; <span>Control Panel</span>
                </a>
                <a href="https://dalam.world/forums" class="btn-secondary" id="link-forum">
                    &#128172; <span>Forum</span>
                </a>
            </div>

        </div>
    </div>

        /* ==================== ОПРЕДЕЛЕНИЕ ЯЗЫКА ==================== */
        function getUserLanguage() {
            // 1. GET параметр ?lang=xx
            const params = new URLSearchParams(window.location.search);
            const langParam = params.get('lang');
            const supported = Object.keys(translations);
            if (langParam && supported.includes(langParam)) return langParam;

            // 2. localStorage
            const saved = localStorage.getItem('dalam_lang');
            if (saved && supported.includes(saved)) return saved;

            // 3. Браузер
            const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase().split('-')[0];
            return supported.includes(lang) ? lang : 'en';
        }

        let currentLang = getUserLanguage();
        let t = translations[currentLang];

        /* ==================== COOKIE ==================== */
        function setCookie(name, value, days) {
            let expires = '';
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = '; expires=' + date.toUTCString();
            }
            document.cookie = name + '=' + (value || '') + expires + '; path=/; domain=.dalam.world';
        }

        function getCookie(name) {
            const nameEQ = name + '=';
            const ca = document.cookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) === ' ') c = c.substring(1);
                if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length);
            }
            return null;
        }

        /* ==================== GET ПАРАМЕТРЫ ==================== */
        let _showRef = false;

        function initFromUrl() {
            const params = new URLSearchParams(window.location.search);

            // endpoint — base64 URL для редиректа
            const ep = params.get('endpoint');
            if (ep) {
                try { window._redirectUrl = atob(ep); }
                catch(e) { window._redirectUrl = 'https://dalam.world/login'; }
            } else {
                window._redirectUrl = 'https://dalam.world/login';
            }

            // save_txt
            const saveTxt = params.get('save_txt');
            if (saveTxt === 'true') {
                document.getElementById('save-txt-checkbox').checked = true;
            }

            // show_ref
            _showRef = params.get('show_ref') === 'true';
        }

        /* ==================== РЕФЕРАЛЬНАЯ СИСТЕМА ==================== */
        function handleReferral() {
            const params = new URLSearchParams(window.location.search);
            const refFromUrl = params.get('ref_id');
            const refFromCookie = getCookie('ref_id');
            let referralCode = '';

            if (refFromUrl) {
                referralCode = refFromUrl;
                setCookie('ref_id', referralCode, 30);
            } else if (refFromCookie) {
                referralCode = refFromCookie;
            }

            if (referralCode) {
                fields.referer.value = referralCode;
                if (!_showRef) {
                    document.getElementById('referer-group').style.display = 'none';
                }
            }
        }

        /* ==================== ПЕРЕВОДЫ UI ==================== */
        function applyTranslations() {
            fields.login.placeholder = t.loginPlaceholder;
            fields.password.placeholder = t.passwordPlaceholder;
            fields.repassword.placeholder = t.repasswordPlaceholder;
            fields.email.placeholder = t.emailPlaceholder;

            submitBtn.textContent = t.registerButton;
            if (genPassLink) genPassLink.textContent = t.genPass;

            document.getElementById('show-pass-label').textContent = t.showPass;
            document.getElementById('save-txt-label').textContent = t.saveTxt;
            document.querySelector('#link-cp span').textContent = t.controlPanel;
            document.querySelector('#link-forum span').textContent = t.forum;

            document.title = 'Dalam ID \u2014 ' + t.pageTitle;

            window.validationErrors = {
                login: t.loginError,
                password: t.passwordError,
                repassword: t.repasswordError,
                email: t.emailError
            };
        }

        /* ==================== ВАЛИДАЦИЯ ==================== */
        function clearErrors() {
            for (let k in errs) {
                errs[k].textContent = '';
                errs[k].previousElementSibling && errs[k].previousElementSibling.classList.remove('input-error');
            }
            messages.innerHTML = '';
        }

        function validate() {
            clearErrors();
            let ok = true;

            if (!/^[A-Za-z0-9-]{6,14}$/.test(fields.login.value.trim())) {
                errs.login.textContent = window.validationErrors.login;
                fields.login.classList.add('input-error');
                ok = false;
            }

            const pv = fields.password.value;
            if (pv.length < 6 || pv.length > 16) {
                errs.password.textContent = window.validationErrors.password;
                fields.password.classList.add('input-error');
                ok = false;
            }

            if (pv !== fields.repassword.value) {
                errs.repassword.textContent = window.validationErrors.repassword;
                fields.repassword.classList.add('input-error');
                ok = false;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(fields.email.value.trim())) {
                errs.email.textContent = window.validationErrors.email;
                fields.email.classList.add('input-error');
                ok = false;
            }

            return ok;
        }

        if (genPassLink) {

                e.preventDefault();
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789-';
                let out = '';
                for (let i = 0; i < 12; i++) {
                    out += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                fields.password.value = out;
                fields.repassword.value = out;
                // Показываем пароль и ставим галочку

        function showMessage(html, type) {
            const div = document.createElement('div');

            div.innerHTML = html;
            messages.appendChild(div);

        /* ==================== СКАЧИВАНИЕ TXT ==================== */
        function downloadAccountFile() {
            const login = fields.login.value.trim();
            const password = fields.password.value;
            const email = fields.email.value.trim();

            const content =
                t.fileHeader +
                t.loginLabel + login + '\n' +
                t.passwordLabel + password + '\n' +
                t.emailLabel + email + '\n\n' +
                t.successTitle + '\n' +
                t.successText;

            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Dalam World Account.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        /* ==================== УСПЕХ ==================== */
        function handleSuccess() {
            // Скачать TXT только если чекбокс отмечен
            if (document.getElementById('save-txt-checkbox').checked) {
                downloadAccountFile();
            }

            // Зелёная вспышка карточки
            const card = document.getElementById('card');
            if (card) card.classList.add('success-flash');

            // Показать сообщение
            const successHTML =
                '<div style="text-align:center">' +
                '<h4>' + t.successTitle + '</h4>' +
                '<p style="white-space:pre-line;margin:8px 0 0">' + t.successText + '</p>' +
                '</div>';
            showMessage(successHTML, 'success');

            // Редирект через 1.5 секунды
            setTimeout(function() {
                window.location.href = window._redirectUrl;
            }, 1500);
        }

        /* ==================== ОБРАБОТКА ОШИБОК ==================== */
        function handleError(danger) {
            const ul = danger.querySelector('ul');
            if (!ul) {
                showMessage(danger.innerHTML, 'danger');
                return;
            }

            const li = ul.querySelector('li');
            if (!li) {
                showMessage(ul.outerHTML, 'danger');
                return;
            }

            const b = li.querySelector('b');
            const valueHTML = b ? b.innerHTML : '';
            const liText = li.innerText || '';

            // Логин уже существует
            if (liText.includes('\u041b\u043e\u0433\u0438\u043d') || liText.includes('Login') || liText.includes('login') || liText.includes('\u041b\u043e\u0433\u0456\u043d')) {
                const translated = t.loginExists.replace('{value}', valueHTML);
                showMessage('<ul><li>' + translated + '</li></ul>', 'danger');
                return;
            }

            // Email уже существует
            if (liText.toLowerCase().includes('email') || liText.includes('\u042d\u043b\u0435\u043a\u0442\u0440\u043e\u043d') || liText.includes('\u0415\u043c\u0435\u0439\u043b')) {
                const cfLink = li.querySelector('.__cf_email__');
                let emailValue = '';
                if (cfLink) {
                    emailValue = cfLink.textContent.trim();
                } else {
                    emailValue = b ? b.textContent.trim() : fields.email.value.trim();
                }
                const translated = t.emailExists.replace('{value}', emailValue || fields.email.value.trim());
                showMessage('<ul><li>' + translated + '</li></ul>', 'danger');
                return;
            }

            // Любая другая ошибка
            showMessage(ul.outerHTML, 'danger');
        }

        /* ==================== ОТПРАВКА ФОРМЫ ==================== */
        async function submitAjax(e) {
            e.preventDefault();
            if (!validate()) return;

            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = t.sending;

            clearErrors();

            try {
                const fd = new FormData();
                fd.set('GHTWEB_CSRF_TOKEN', fields.csrf.value || '');
                fd.set('RegisterForm[login]', fields.login.value.trim());
                fd.set('RegisterForm[password]', fields.password.value);
                fd.set('RegisterForm[re_password]', fields.repassword.value);
                fd.set('RegisterForm[email]', fields.email.value.trim());
                fd.set('RegisterForm[referer]', fields.referer.value.trim());

                const resp = await fetch(form.action, {
                    method: 'POST',
                    body: fd,
                    credentials: 'include'
                });

                const text = await resp.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');

                const success = doc.querySelector('.alert.alert-success');
                const danger = doc.querySelector('.alert.alert-danger');

                if (success) {
                    handleSuccess();
                } else if (danger) {
                    handleError(danger);
                } else {
                    showMessage(doc.body.innerHTML, resp.ok ? 'success' : 'danger');
                }

                // Обновляем CSRF
                const newCsrf = doc.querySelector('input[name="GHTWEB_CSRF_TOKEN"]');
                if (newCsrf) fields.csrf.value = newCsrf.value;

            } catch (err) {
                showMessage('Error: ' + err.message, 'danger');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        }

        /* ==================== ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКОВ ==================== */
        function initLanguageSwitcher() {
            const container = document.getElementById('lang-switcher');
            container.innerHTML = '';

            // Видимые кнопки
            visibleLangs.forEach(function(code) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'lang-btn' + (code === currentLang ? ' active' : '');
                btn.textContent = code.toUpperCase();
                btn.setAttribute('aria-label', langNames[code] || code);
                btn.addEventListener('click', function() { switchLanguage(code); });
                container.appendChild(btn);
            });

            // Кнопка "+"
            const moreWrap = document.createElement('div');
            moreWrap.className = 'lang-more';

            const moreBtn = document.createElement('button');
            moreBtn.type = 'button';
            moreBtn.className = 'lang-btn';
            moreBtn.textContent = '+';
            moreBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                dropdown.classList.toggle('open');
            });
            moreWrap.appendChild(moreBtn);

            // Выпадающий список
            const dropdown = document.createElement('div');
            dropdown.className = 'lang-dropdown';

            const allLangs = Object.keys(translations);
            allLangs.forEach(function(code) {
                if (visibleLangs.includes(code)) return;
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = langNames[code] || code;
                if (code === currentLang) btn.style.color = 'var(--gold)';
                btn.addEventListener('click', function() {
                    switchLanguage(code);
                    dropdown.classList.remove('open');
                });
                dropdown.appendChild(btn);
            });

            moreWrap.appendChild(dropdown);
            container.appendChild(moreWrap);

            // Закрытие дропдауна при клике вне
            document.addEventListener('click', function() {
                dropdown.classList.remove('open');
            });
        }

        function switchLanguage(code) {
            if (!translations[code]) return;
            currentLang = code;
            t = translations[code];
            localStorage.setItem('dalam_lang', code);

            // RTL для арабского
            document.documentElement.dir = code === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = code;

            applyTranslations();
            initLanguageSwitcher();
        }

        /* ==================== ИНИЦИАЛИЗАЦИЯ ==================== */
        function init() {
            // RTL для арабского при первой загрузке
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;

            initFromUrl();
            applyTranslations();
            handleReferral();
            initLanguageSwitcher();
            form.addEventListener('submit', submitAjax);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    })();
    </script>
</body>
